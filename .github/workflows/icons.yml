name: Generate Icons
on:
  pull_request:
    branches: [main]
    paths:
      - "icon.svg"
      - "logo.svg"
      - ".github/workflows/icons.yml"
      - "packaging/generate-icons.sh"
concurrency:
  group: icons-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate icons
        run: bash packaging/generate-icons.sh

      - name: Check icons are up to date
        run: |
          if git diff --quiet packaging/ web/public/ cmd/warden-tray/icon.png docs/site/public/favicon.ico docs/site/src/assets/logo-light.svg docs/site/src/assets/logo-dark.svg; then
            echo "Icons are up to date"
            exit 0
          fi
          echo "::error::Generated icons are out of date. Run 'bash packaging/generate-icons.sh' locally and commit the results."
          git diff --stat
          exit 1
