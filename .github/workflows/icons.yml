name: Generate Icons
on:
  push:
    paths:
      - "icon.svg"
      - "logo.svg"
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Generate icons
        run: bash packaging/generate-icons.sh

      - name: Commit generated icons
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A packaging/ web/public/ cmd/warden-tray/icon.png
          if git diff --cached --quiet; then
            echo "No icon changes to commit"
          else
            git commit -m "chore: regenerate icons from source SVGs [skip ci]"
            git push
          fi
