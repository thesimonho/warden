name: CI
on:
  pull_request:
    branches: [main]
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      web: ${{ steps.filter.outputs.web }}
      api-docs: ${{ steps.filter.outputs.api-docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
            web:
              - 'web/**'
            api-docs:
              - 'docs/openapi/**'
              - 'internal/server/**'
              - 'api/**'
  go:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web install
      - run: npm --prefix web run typecheck
      - run: npm --prefix web run test
  api-docs:
    needs: changes
    if: needs.changes.outputs.api-docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/site/package-lock.json
      - run: npm --prefix docs/site install
      - name: Generate API docs
        run: node docs/site/generate-api-docs.mjs
      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet docs/plugin/skills/guide/reference/api/; then
            echo "ERROR: Agent-format API docs are out of date."
            echo "Run 'just generate-api-docs' and commit the result."
            git diff docs/plugin/skills/guide/reference/api/
            exit 1
          fi
  ci:
    runs-on: ubuntu-latest
    needs: [go, web, api-docs]
    if: always()
    steps:
      - name: Check results
        run: |
          results=("${{ needs.go.result }}" "${{ needs.web.result }}" "${{ needs.api-docs.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              exit 1
            fi
          done
