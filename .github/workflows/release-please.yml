name: Release Please
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
permissions:
  actions: write
  contents: write
  pull-requests: write
  packages: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      # App token avoids GITHUB_TOKEN anti-recursion — pushes from the
      # app identity trigger pull_request events so CI runs on the PR.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: tag major and minor versions
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -d v${{ steps.release.outputs.major }} || true
          git tag -d v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
          git push origin :v${{ steps.release.outputs.major }} || true
          git push origin :v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} || true
          git tag -a v${{ steps.release.outputs.major }} -m "Release v${{ steps.release.outputs.major }}"
          git tag -a v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }} -m "Release v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}"
          git push origin v${{ steps.release.outputs.major }}
          git push origin v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}
  build-webapp:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web install
      - run: npm --prefix web run build
      - run: rm -rf internal/server/ui && cp -r web/dist internal/server/ui
      - uses: actions/upload-artifact@v4
        with:
          name: embedded-ui
          path: internal/server/ui/
  build-server:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build headless server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/thesimonho/warden/version.Version=${{ needs.release-please.outputs.tag_name }}" \
            -o warden-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/warden
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            warden-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
  build-tui:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build TUI binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/thesimonho/warden/version.Version=${{ needs.release-please.outputs.tag_name }}" \
            -o warden-tui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} \
            ./cmd/warden-tui
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            warden-tui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
  build-desktop-linux:
    needs: [release-please, build-webapp]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: embedded-ui
          path: internal/server/ui/
      - name: Build desktop binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/thesimonho/warden/version.Version=${{ needs.release-please.outputs.tag_name }}" \
            -o warden-desktop-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/warden-desktop
      - name: Build deb/rpm/Arch packages
        env:
          VERSION: ${{ needs.release-please.outputs.tag_name }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          # Strip leading 'v' from tag for package version (e.g. v0.5.3 → 0.5.3)
          export VERSION="${VERSION#v}"

          # Rename binary to match nfpm expected name
          cp warden-desktop-linux-${{ matrix.goarch }} warden-desktop

          # Install nfpm (pinned version)
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.1

          nfpm pkg --config packaging/linux/nfpm.yaml --packager deb --target .
          nfpm pkg --config packaging/linux/nfpm.yaml --packager rpm --target .
          nfpm pkg --config packaging/linux/nfpm.yaml --packager archlinux --target .
      - name: Build AppImage
        if: matrix.goarch == 'amd64'
        run: |
          # Set up AppDir structure
          mkdir -p Warden.AppDir/usr/bin
          mkdir -p Warden.AppDir/usr/share/applications
          mkdir -p Warden.AppDir/usr/share/icons/hicolor/512x512/apps

          cp warden-desktop Warden.AppDir/usr/bin/warden-desktop
          cp packaging/linux/warden.desktop Warden.AppDir/usr/share/applications/warden.desktop
          cp packaging/linux/warden.png Warden.AppDir/usr/share/icons/hicolor/512x512/apps/warden.png

          # AppImage requires desktop file and icon at root
          cp packaging/linux/warden.desktop Warden.AppDir/warden.desktop
          cp packaging/linux/warden.png Warden.AppDir/warden.png

          # Symlink AppRun to the binary
          ln -s usr/bin/warden-desktop Warden.AppDir/AppRun

          # Download appimagetool (pinned release)
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --no-appstream Warden.AppDir warden-desktop-linux-amd64.AppImage
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            warden-desktop-linux-${{ matrix.goarch }} \
            *.deb \
            *.rpm \
            *.pkg.tar.zst

          # AppImage is only built for amd64
          if [ -f warden-desktop-linux-amd64.AppImage ]; then
            gh release upload \
              ${{ needs.release-please.outputs.tag_name }} \
              warden-desktop-linux-amd64.AppImage
          fi
  build-desktop-macos:
    needs: [release-please, build-webapp]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - goarch: arm64
            label: arm64
          - goarch: amd64
            label: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: embedded-ui
          path: internal/server/ui/
      - name: Build desktop binary
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/thesimonho/warden/version.Version=${{ needs.release-please.outputs.tag_name }}" \
            -o bin/warden-desktop \
            ./cmd/warden-desktop
      - name: Create .app bundle
        run: bash packaging/macos/bundle.sh ${{ needs.release-please.outputs.tag_name }}
      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir dmg-staging
          cp -r bin/Warden.app dmg-staging/
          create-dmg \
            --volname "Warden" \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Warden.app" 150 200 \
            --app-drop-link 450 200 \
            bin/warden-desktop-macos-${{ matrix.label }}.dmg \
            dmg-staging/
      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            bin/warden-desktop-macos-${{ matrix.label }}.dmg
  build-desktop-windows:
    needs: [release-please, build-webapp]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v8
        with:
          name: embedded-ui
          path: internal/server/ui/
      - name: Embed icon and version info
        shell: bash
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          goversioninfo -64 \
            -icon packaging/windows/warden.ico \
            -o cmd/warden-desktop/resource_windows.syso \
            packaging/windows/versioninfo.json
      - name: Build desktop binary
        shell: bash
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -H windowsgui -X github.com/thesimonho/warden/version.Version=${{ needs.release-please.outputs.tag_name }}" \
            -o warden-desktop-windows-amd64.exe \
            ./cmd/warden-desktop
      - name: Create installer
        shell: pwsh
        run: |
          $version = "${{ needs.release-please.outputs.tag_name }}" -replace '^v',''
          iscc "/DVERSION=$version" packaging\windows\warden.iss
      - name: Upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            warden-desktop-windows-amd64.exe \
            Warden-Setup-amd64.exe
  container-artifacts:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/container.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}
      major: ${{ needs.release-please.outputs.major }}
      minor: ${{ needs.release-please.outputs.minor }}
    secrets: inherit
  checksums:
    needs:
      - release-please
      - build-server
      - build-tui
      - build-desktop-linux
      - build-desktop-macos
      - build-desktop-windows
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download \
            ${{ needs.release-please.outputs.tag_name }} \
            --repo ${{ github.repository }} \
            --dir assets
      - name: Generate checksums
        run: |
          cd assets
          sha256sum * > ../checksums.txt
      - name: Upload checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            ${{ needs.release-please.outputs.tag_name }} \
            checksums.txt
