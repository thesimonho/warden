name: Container Artifacts
on:
  push:
    branches: [main]
    paths: ['container/**']
  workflow_call:
    inputs:
      tag_name:
        description: 'Release version tag (e.g., v1.0.0)'
        type: string
        required: true
      major:
        description: 'Major version number'
        type: string
        required: true
      minor:
        description: 'Minor version number'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release version tag — leave empty to build :latest only'
        required: false
permissions:
  packages: write
  contents: read
env:
  IMAGE_NAME: warden
  FEATURE_NAME: session-tools
jobs:
  # ── Push to main: build and tag :latest ──────────────────────────────
  build-image:
    if: ${{ !inputs.tag_name }}
    uses: ./.github/workflows/container-build.yml
    with:
      push: true
      tags: |
        type=raw,value=latest
        type=sha,prefix=sha-,format=short

  push-feature-latest:
    if: ${{ !inputs.tag_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install oras
        uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Stage feature files
        run: |
          mkdir -p _staging/session-tools
          cp container/devcontainer-feature/* _staging/session-tools/
          cp container/scripts/*.sh _staging/session-tools/
          cp container/scripts/shared/*.sh _staging/session-tools/
          cp container/scripts/claude/*.sh _staging/session-tools/
          cp container/scripts/codex/*.sh _staging/session-tools/
      - name: Push feature as :latest
        run: |
          cd _staging/session-tools
          tar cf feature.tar *
          oras push \
            ghcr.io/${{ github.repository_owner }}/warden/${{ env.FEATURE_NAME }}:latest \
            --config /dev/null:application/vnd.devcontainers \
            feature.tar:application/vnd.devcontainers.layer.v1+tar

  # ── Release: build and tag with semver ────────────────────────────────
  build-image-release:
    if: ${{ inputs.tag_name }}
    uses: ./.github/workflows/container-build.yml
    with:
      push: true
      tags: |
        type=raw,value=latest
        type=raw,value=${{ inputs.tag_name }}
        type=raw,value=v${{ inputs.major }}.${{ inputs.minor }}
        type=raw,value=v${{ inputs.major }}
        type=sha,prefix=sha-,format=short

  publish-feature-release:
    if: ${{ inputs.tag_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stage feature for publishing
        run: |
          mkdir -p _staging/session-tools
          cp container/devcontainer-feature/* _staging/session-tools/
          cp container/scripts/*.sh _staging/session-tools/
          cp container/scripts/shared/*.sh _staging/session-tools/
          cp container/scripts/claude/*.sh _staging/session-tools/
          cp container/scripts/codex/*.sh _staging/session-tools/
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish feature with semver tags
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./_staging"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old untagged feature versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          versions=$(gh api -H "Accept: application/vnd.github+json" \
            "/user/packages/container/warden%2F${{ env.FEATURE_NAME }}/versions" |
            jq '[.[] | select(.metadata.container.tags | length == 0)] | .[].id')
          for version_id in $versions; do
            echo "Deleting untagged feature version ID: $version_id"
            gh api --method DELETE "/user/packages/container/warden%2F${{ env.FEATURE_NAME }}/versions/$version_id" || true
          done
