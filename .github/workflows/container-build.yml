name: Container Build (reusable)

# Reusable workflow that builds and optionally pushes the container image.
# Called by container.yml (on push/release) and container-scheduled.yml (on schedule).

on:
  workflow_call:
    inputs:
      push:
        description: 'Push images to GHCR'
        type: boolean
        required: true
      tags:
        description: 'Docker metadata tags (one per line)'
        type: string
        required: true
      description:
        description: 'OCI image description label'
        type: string
        default: 'Project container image with abduco, Claude Code CLI, and Codex CLI for Warden sessions'

permissions:
  packages: write
  contents: read

env:
  IMAGE_NAME: warden

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: ${{ inputs.tags }}
          labels: |
            org.opencontainers.image.description=${{ inputs.description }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./container
          push: ${{ inputs.push }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Delete old untagged GHCR image versions
        if: ${{ inputs.push }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          versions=$(gh api -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${{ env.IMAGE_NAME }}/versions" |
            jq '[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[2:] | .[].id')
          for version_id in $versions; do
            echo "Deleting untagged image version ID: $version_id"
            gh api --method DELETE "/user/packages/container/${{ env.IMAGE_NAME }}/versions/$version_id" || true
          done
