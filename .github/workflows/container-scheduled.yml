name: Scheduled CLI Validation

# Installs the latest Claude Code and Codex CLIs, runs a test prompt,
# validates the JSONL output with the Go parsers, and pushes a new
# container image only if validation succeeds. Opens a GitHub issue
# on failure.
#
# This workflow does NOT use the Warden container image for testing —
# it installs CLIs directly on the runner to validate parser compatibility
# with the latest upstream versions independently of container infrastructure.

on:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of each month at 06:00 UTC
  workflow_dispatch: # Manual trigger for testing

permissions:
  packages: write
  contents: read
  issues: write

env:
  IMAGE_NAME: warden
  FEATURE_NAME: session-tools
  TEST_PROMPT: "Read the file README.md, then create a file called /tmp/warden-test.txt with hello, then delete it"

jobs:
  # ── Validate CLI JSONL output against Go parsers ─────────────────────
  validate:
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.result.outputs.passed }}
      claude_failed: ${{ steps.result.outputs.claude_failed }}
      codex_failed: ${{ steps.result.outputs.codex_failed }}
      claude_version: ${{ steps.versions.outputs.claude }}
      codex_version: ${{ steps.versions.outputs.codex }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Install latest CLIs and capture versions.
      - name: Install CLIs
        id: versions
        run: |
          # Claude Code — standalone binary via official installer.
          curl -fsSL https://claude.ai/install.sh | bash
          CLAUDE_VER=$(claude --version 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+' || echo "unknown")
          echo "claude=$CLAUDE_VER" >> "$GITHUB_OUTPUT"

          # Codex — npm global install.
          npm install -g @openai/codex
          CODEX_VER=$(codex --version 2>/dev/null | head -1 | grep -oP '\d+\.\d+\.\d+' || echo "unknown")
          echo "codex=$CODEX_VER" >> "$GITHUB_OUTPUT"

          echo "CLI versions: claude=$CLAUDE_VER codex=$CODEX_VER"

      # Create a minimal workspace for the test prompt.
      - name: Set up test workspace
        run: |
          mkdir -p /tmp/warden-cli-test
          echo "# Test Workspace" > /tmp/warden-cli-test/README.md
          cd /tmp/warden-cli-test && git init && git add . && \
            git -c user.email="ci@test" -c user.name="CI" commit -m "init"

      # Claude Code CLI test
      - name: Run Claude Code CLI
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/claude-output"
          cd /tmp/warden-cli-test
          claude --dangerously-skip-permissions -p '${{ env.TEST_PROMPT }}' || true
          cp ~/.claude/projects/*/*.jsonl "$RUNNER_TEMP/claude-output/" 2>/dev/null || true

      - name: Validate Claude JSONL
        id: validate-claude
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        continue-on-error: true
        run: |
          JSONL_FILE=$(find "$RUNNER_TEMP/claude-output" -name '*.jsonl' | head -1)
          if [ -z "$JSONL_FILE" ]; then
            echo "::error::No Claude JSONL file found"
            exit 1
          fi
          echo "Validating: $JSONL_FILE"
          VALIDATE_JSONL="$JSONL_FILE" go test ./agent/claudecode/ -run TestValidateLive -v

      # Codex CLI test
      - name: Run Codex CLI
        if: ${{ env.OPENAI_API_KEY != '' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/codex-output"
          cd /tmp/warden-cli-test
          codex --dangerously-bypass-approvals-and-sandbox --no-alt-screen -q '${{ env.TEST_PROMPT }}' || true
          cp ~/.codex/sessions/*/*/*.jsonl "$RUNNER_TEMP/codex-output/" 2>/dev/null || true

      - name: Validate Codex JSONL
        id: validate-codex
        if: ${{ env.OPENAI_API_KEY != '' }}
        continue-on-error: true
        run: |
          JSONL_FILE=$(find "$RUNNER_TEMP/codex-output" -name '*.jsonl' | head -1)
          if [ -z "$JSONL_FILE" ]; then
            echo "::error::No Codex JSONL file found"
            exit 1
          fi
          echo "Validating: $JSONL_FILE"
          VALIDATE_JSONL="$JSONL_FILE" go test ./agent/codex/ -run TestValidateLive -v

      - name: Set result
        id: result
        run: |
          CLAUDE_OK="${{ steps.validate-claude.outcome != 'failure' }}"
          CODEX_OK="${{ steps.validate-codex.outcome != 'failure' }}"
          if [ "$CLAUDE_OK" = "true" ] && [ "$CODEX_OK" = "true" ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "claude_failed=${{ steps.validate-claude.outcome == 'failure' }}" >> "$GITHUB_OUTPUT"
            echo "codex_failed=${{ steps.validate-codex.outcome == 'failure' }}" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # ── Push image if validation passed ──────────────────────────────────
  push:
    needs: validate
    if: needs.validate.outputs.passed == 'true'
    uses: ./.github/workflows/container-build.yml
    with:
      push: true
      tags: |
        type=raw,value=latest
        type=sha,prefix=sha-,format=short

  push-feature:
    needs: validate
    if: needs.validate.outputs.passed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install oras
        uses: oras-project/setup-oras@v1
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
      - uses: ./.github/actions/stage-feature
      - name: Push feature
        run: |
          cd _staging/session-tools
          tar cf feature.tar *
          oras push \
            ghcr.io/${{ github.repository_owner }}/warden/${{ env.FEATURE_NAME }}:latest \
            --config /dev/null:application/vnd.devcontainers \
            feature.tar:application/vnd.devcontainers.layer.v1+tar

  # ── Open issue on failure ────────────────────────────────────────────
  open-issue:
    needs: validate
    if: needs.validate.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_FAILED: ${{ needs.validate.outputs.claude_failed }}
          CODEX_FAILED: ${{ needs.validate.outputs.codex_failed }}
          CLAUDE_VERSION: ${{ needs.validate.outputs.claude_version }}
          CODEX_VERSION: ${{ needs.validate.outputs.codex_version }}
        run: |
          # Build label list and title based on which CLI(s) failed.
          LABELS=""
          FAILED_AGENTS=""
          VERSION_LINES=""

          if [ "$CLAUDE_FAILED" = "true" ]; then
            LABELS="claude-code"
            FAILED_AGENTS="Claude Code"
            VERSION_LINES="- Claude Code: \`${CLAUDE_VERSION}\`"
          fi
          if [ "$CODEX_FAILED" = "true" ]; then
            [ -n "$LABELS" ] && LABELS="${LABELS},"
            LABELS="${LABELS}codex"
            [ -n "$FAILED_AGENTS" ] && FAILED_AGENTS="${FAILED_AGENTS} + "
            FAILED_AGENTS="${FAILED_AGENTS}Codex"
            [ -n "$VERSION_LINES" ] && VERSION_LINES="${VERSION_LINES}\n"
            VERSION_LINES="${VERSION_LINES}- Codex: \`${CODEX_VERSION}\`"
          fi

          gh issue create \
            --title "${FAILED_AGENTS} JSONL validation failed ($(date +%Y-%m-%d))" \
            --body "$(printf 'The scheduled container validation failed for **%s**.\nThe image was **not** pushed to GHCR.\n\n**CLI versions:**\n%b\n\n**Workflow run:** %s' \
              "$FAILED_AGENTS" \
              "$VERSION_LINES" \
              "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")" \
            --label "$LABELS"
