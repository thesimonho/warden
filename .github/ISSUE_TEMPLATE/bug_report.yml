name: Bug Report
description: Report a bug or unexpected behavior.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Start warden-desktop
        2. Create a project with ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: binary
    attributes:
      label: Binary
      options:
        - warden-desktop
        - warden-tui
        - warden (server)
        - Go library
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Container runtime
      options:
        - Docker
        - Podman
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "e.g. Ubuntu 24.04, macOS 15 arm64, Windows 11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Warden version
      placeholder: "e.g. v1.2.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots.
    validations:
      required: false
