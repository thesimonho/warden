components:
  schemas:
    access.Credential:
      properties:
        injections:
          description: Injections are the container-side delivery targets.
          items:
            $ref: '#/components/schemas/access.Injection'
          type: array
          uniqueItems: false
        label:
          description: Label is a human-readable name for this credential (e.g. "SSH
            Agent Socket").
          type: string
        sources:
          description: Sources are tried in order; the first detected value is used.
          items:
            $ref: '#/components/schemas/access.Source'
          type: array
          uniqueItems: false
        transform:
          $ref: '#/components/schemas/access.Transform'
      type: object
    access.CredentialStatus:
      properties:
        available:
          description: Available is true when at least one source was detected.
          type: boolean
        label:
          description: Label is the credential's human-readable name.
          type: string
        sourceMatched:
          description: SourceMatched describes which source was detected (empty when
            unavailable).
          type: string
      type: object
    access.DetectionResult:
      description: Detection holds per-credential availability on the current host.
      properties:
        available:
          description: Available is true when at least one credential was detected.
          type: boolean
        credentials:
          description: Credentials contains per-credential detection results.
          items:
            $ref: '#/components/schemas/access.CredentialStatus'
          type: array
          uniqueItems: false
        id:
          description: ID is the access item identifier.
          type: string
        label:
          description: Label is the access item display name.
          type: string
      type: object
    access.Injection:
      properties:
        key:
          description: Key is the env var name or container path for the injection
            target.
          type: string
        readOnly:
          description: ReadOnly applies to mount injections — when true the mount
            is read-only.
          type: boolean
        type:
          $ref: '#/components/schemas/access.InjectionType'
        value:
          description: |-
            Value is a static override for the resolved value. When set, this
            is used instead of the source-resolved value. Useful when the
            injection needs a fixed container-side path (e.g. SSH_AUTH_SOCK
            env var pointing to the container socket path).
          type: string
      type: object
    access.InjectionType:
      description: Type is the injection kind (env, mount_file, mount_socket).
      enum:
      - env
      - mount_file
      - mount_socket
      type: string
      x-enum-varnames:
      - InjectionEnvVar
      - InjectionMountFile
      - InjectionMountSocket
    access.Item:
      properties:
        builtIn:
          description: BuiltIn is true for items that ship with Warden.
          type: boolean
        credentials:
          description: Credentials are the individual credential entries in this group.
          items:
            $ref: '#/components/schemas/access.Credential'
          type: array
          uniqueItems: false
        description:
          description: Description explains what this access item provides.
          type: string
        id:
          description: |-
            ID is a stable identifier. Built-in items use well-known IDs
            (e.g. "git", "ssh"); user items get generated UUIDs.
          type: string
        label:
          description: Label is the human-readable display name (e.g. "Git Config").
          type: string
        method:
          $ref: '#/components/schemas/access.Method'
      type: object
    access.Method:
      description: Method is the delivery strategy (only "transport" for now).
      enum:
      - transport
      type: string
      x-enum-varnames:
      - MethodTransport
    access.ResolvedCredential:
      properties:
        error:
          description: Error is set when resolution failed (distinct from "not detected").
          type: string
        injections:
          description: Injections are the resolved container-side deliveries.
          items:
            $ref: '#/components/schemas/access.ResolvedInjection'
          type: array
          uniqueItems: false
        label:
          description: Label is the credential's human-readable name.
          type: string
        resolved:
          description: |-
            Resolved is true when a source was detected and all injections
            were produced.
          type: boolean
        sourceMatched:
          description: SourceMatched describes which source was matched (empty when
            unresolved).
          type: string
      type: object
    access.ResolvedInjection:
      properties:
        key:
          description: Key is the env var name or container path.
          type: string
        readOnly:
          description: ReadOnly applies to mount injections.
          type: boolean
        type:
          $ref: '#/components/schemas/access.InjectionType'
        value:
          description: |-
            Value is the resolved content (env var value, host file path,
            or host socket path).
          type: string
      type: object
    access.ResolvedItem:
      properties:
        credentials:
          description: Credentials contains per-credential resolution results.
          items:
            $ref: '#/components/schemas/access.ResolvedCredential'
          type: array
          uniqueItems: false
        id:
          description: ID is the access item identifier.
          type: string
        label:
          description: Label is the access item display name.
          type: string
      type: object
    access.Source:
      properties:
        type:
          $ref: '#/components/schemas/access.SourceType'
        value:
          description: Value is the env var name, file path, socket path, or command
            string.
          type: string
      type: object
    access.SourceType:
      description: Type is the kind of host source.
      enum:
      - env
      - file
      - socket
      - command
      - named_pipe
      type: string
      x-enum-varnames:
      - SourceEnvVar
      - SourceFilePath
      - SourceSocketPath
      - SourceCommand
      - SourceNamedPipe
    access.Transform:
      description: Transform is an optional processing step applied to the resolved
        value.
      properties:
        params:
          additionalProperties:
            type: string
          description: Params holds type-specific configuration (e.g. "pattern" for
            strip_lines).
          type: object
        type:
          $ref: '#/components/schemas/access.TransformType'
      type: object
    access.TransformType:
      description: Type identifies the transformation.
      enum:
      - strip_lines
      - git_include
      type: string
      x-enum-varnames:
      - TransformStripLines
      - TransformGitInclude
    api.AccessItemListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/api.AccessItemResponse'
          type: array
          uniqueItems: false
      type: object
    api.AccessItemResponse:
      properties:
        builtIn:
          description: BuiltIn is true for items that ship with Warden.
          type: boolean
        credentials:
          description: Credentials are the individual credential entries in this group.
          items:
            $ref: '#/components/schemas/access.Credential'
          type: array
          uniqueItems: false
        description:
          description: Description explains what this access item provides.
          type: string
        detection:
          $ref: '#/components/schemas/access.DetectionResult'
        id:
          description: |-
            ID is a stable identifier. Built-in items use well-known IDs
            (e.g. "git", "ssh"); user items get generated UUIDs.
          type: string
        label:
          description: Label is the human-readable display name (e.g. "Git Config").
          type: string
        method:
          $ref: '#/components/schemas/access.Method'
      type: object
    api.AddProjectRequest:
      properties:
        agentType:
          description: |-
            AgentType selects the CLI agent to run (e.g. "claude-code", "codex").
            Defaults to "claude-code" if omitted.
          type: string
        cloneURL:
          description: |-
            CloneURL is the git repository URL to clone inside the container.
            Required for remote projects; must be empty when ProjectPath is set.
          type: string
        container:
          $ref: '#/components/schemas/api.CreateContainerRequest'
        name:
          description: Name is an optional container name override.
          type: string
        projectPath:
          description: |-
            ProjectPath is the absolute host directory to register as a project.
            Required for local projects; must be empty when CloneURL is set.
          type: string
        temporary:
          description: |-
            Temporary is true when a remote project's workspace should be
            ephemeral (container layer only, lost on recreate). Ignored for
            local projects.
          type: boolean
      type: object
    api.AddProjectResponse:
      properties:
        container:
          $ref: '#/components/schemas/api.ContainerResult'
        project:
          $ref: '#/components/schemas/api.ProjectResult'
      type: object
    api.AgentTemplateOverride:
      properties:
        allowedDomains:
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    api.AuditEntry:
      properties:
        agentType:
          description: AgentType identifies the agent that produced this event (e.g.
            "claude-code", "codex").
          type: string
        attrs:
          additionalProperties: {}
          description: Attrs carries structured key-value metadata.
          type: object
        category:
          description: |-
            Category is the audit category (session, agent, prompt, config, system).
            Computed at query time from the event name — not stored in the DB.
          type: string
        containerName:
          description: ContainerName is a snapshot of the container name at the time
            of the event.
          type: string
        data:
          description: Data carries the raw event payload (for agent events, preserves
            hook JSON).
          items:
            type: integer
          type: array
          uniqueItems: false
        event:
          description: Event is a snake_case identifier for the event type (e.g. "session_start").
          type: string
        id:
          description: ID is the database row identifier. Unique across all entries.
          type: integer
        level:
          $ref: '#/components/schemas/api.AuditLevel'
        msg:
          description: Message is a human-readable description.
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier (sha256 of
            host path, 12 hex chars).
          type: string
        source:
          $ref: '#/components/schemas/api.AuditSource'
        ts:
          description: Timestamp is when the event occurred (ISO 8601 with milliseconds).
          type: string
        worktree:
          description: Worktree is the worktree ID (only for agent events).
          type: string
      type: object
    api.AuditLevel:
      description: Level is the severity of the entry (info, warn, error).
      enum:
      - info
      - warn
      - error
      type: string
      x-enum-varnames:
      - AuditLevelInfo
      - AuditLevelWarn
      - AuditLevelError
    api.AuditLogMode:
      enum:
      - "off"
      - standard
      - detailed
      type: string
      x-enum-varnames:
      - AuditLogOff
      - AuditLogStandard
      - AuditLogDetailed
    api.AuditSource:
      description: Source identifies the origin layer (agent, backend, frontend, container).
      enum:
      - agent
      - backend
      - frontend
      - container
      - external
      type: string
      x-enum-varnames:
      - AuditSourceAgent
      - AuditSourceBackend
      - AuditSourceFrontend
      - AuditSourceContainer
      - AuditSourceExternal
    api.AuditSummary:
      properties:
        timeRange:
          $ref: '#/components/schemas/api.TimeRange'
        topTools:
          description: TopTools lists the most frequently used tools with counts.
          items:
            $ref: '#/components/schemas/api.ToolCount'
          type: array
          uniqueItems: false
        totalCostUsd:
          description: TotalCostUSD is the aggregate cost across all projects.
          type: number
        totalPrompts:
          description: TotalPrompts is the number of user_prompt events.
          type: integer
        totalSessions:
          description: TotalSessions is the number of session_start events.
          type: integer
        totalToolUses:
          description: TotalToolUses is the number of tool_use events.
          type: integer
        uniqueProjects:
          description: UniqueProjects is the number of distinct projects with events.
          type: integer
        uniqueWorktrees:
          description: UniqueWorktrees is the number of distinct worktrees with events.
          type: integer
      type: object
    api.BatchProjectAction:
      description: 'Action is the operation to perform: "stop", "restart", or "delete".'
      enum:
      - stop
      - restart
      - delete
      type: string
      x-enum-varnames:
      - BatchActionStop
      - BatchActionRestart
      - BatchActionDelete
    api.BatchProjectRef:
      properties:
        agentType:
          type: string
        projectId:
          type: string
      type: object
    api.BatchProjectRequest:
      properties:
        action:
          $ref: '#/components/schemas/api.BatchProjectAction'
        projects:
          description: Projects lists the targets for the operation.
          items:
            $ref: '#/components/schemas/api.BatchProjectRef'
          type: array
          uniqueItems: false
      type: object
    api.BatchProjectResponse:
      properties:
        results:
          items:
            $ref: '#/components/schemas/api.BatchProjectResult'
          type: array
          uniqueItems: false
      type: object
    api.BatchProjectResult:
      properties:
        agentType:
          type: string
        error:
          type: string
        projectId:
          type: string
        success:
          type: boolean
      type: object
    api.BudgetStatusResponse:
      properties:
        agentType:
          type: string
        budgetSource:
          description: BudgetSource is "project" (per-project), "global" (default),
            or "none" (no budget set).
          type: string
        effectiveBudget:
          type: number
        isEstimatedCost:
          type: boolean
        isOverBudget:
          type: boolean
        projectId:
          type: string
        totalCost:
          type: number
      type: object
    api.ClipboardUploadResponse:
      properties:
        path:
          description: Path is the absolute path of the staged file inside the container.
          type: string
      type: object
    api.ContainerConfig:
      properties:
        agentType:
          $ref: '#/components/schemas/constants.AgentType'
        allowedDomains:
          description: AllowedDomains lists domains accessible when NetworkMode is
            "restricted".
          items:
            type: string
          type: array
          uniqueItems: false
        cloneURL:
          description: CloneURL is the git repository URL (remote projects only).
          type: string
        costBudget:
          description: CostBudget is the per-project cost limit in USD (0 = use global
            default).
          type: number
        enabledAccessItems:
          description: EnabledAccessItems lists active access item IDs (e.g. ["git","ssh"]).
          items:
            type: string
          type: array
          uniqueItems: false
        enabledRuntimes:
          description: EnabledRuntimes lists active runtime IDs (e.g. ["node","python","go"]).
          items:
            type: string
          type: array
          uniqueItems: false
        envVars:
          additionalProperties:
            type: string
          type: object
        forwardedPorts:
          description: ForwardedPorts lists container ports exposed via the reverse
            proxy.
          items:
            type: integer
          type: array
          uniqueItems: false
        image:
          type: string
        mounts:
          items:
            $ref: '#/components/schemas/api.Mount'
          type: array
          uniqueItems: false
        name:
          type: string
        networkMode:
          $ref: '#/components/schemas/api.NetworkMode'
        projectPath:
          type: string
        skipPermissions:
          type: boolean
        temporary:
          description: Temporary is true when a remote project's workspace is ephemeral.
          type: boolean
      type: object
    api.ContainerResult:
      description: |-
        Container holds the container result when a container was created.
        Nil when the request did not include container configuration.
      properties:
        agentType:
          description: AgentType is the agent type for this container.
          type: string
        containerId:
          description: ContainerID is the Docker container ID.
          type: string
        name:
          description: Name is the container name.
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier.
          type: string
        recreated:
          description: Recreated is true when the container was fully recreated (not
            just settings updated).
          type: boolean
      type: object
    api.CreateAccessItemRequest:
      properties:
        credentials:
          items:
            $ref: '#/components/schemas/access.Credential'
          type: array
          uniqueItems: false
        description:
          type: string
        label:
          type: string
      type: object
    api.CreateContainerRequest:
      description: |-
        Container holds optional container configuration. When provided, a
        container is created as part of the same request.
      properties:
        agentType:
          $ref: '#/components/schemas/constants.AgentType'
        allowedDomains:
          description: AllowedDomains lists domains accessible when NetworkMode is
            "restricted".
          items:
            type: string
          type: array
          uniqueItems: false
        cloneURL:
          description: CloneURL is the git repository URL to clone inside the container
            (remote projects).
          type: string
        costBudget:
          description: CostBudget is the per-project cost limit in USD (0 = use global
            default).
          type: number
        enabledAccessItems:
          description: EnabledAccessItems lists active access item IDs (e.g. ["git","ssh"]).
          items:
            type: string
          type: array
          uniqueItems: false
        enabledRuntimes:
          description: EnabledRuntimes lists active runtime IDs (e.g. ["node","python","go"]).
          items:
            type: string
          type: array
          uniqueItems: false
        envVars:
          additionalProperties:
            type: string
          type: object
        forwardedPorts:
          description: |-
            ForwardedPorts lists container ports to expose via the reverse proxy.
            Each port (1-65535) is accessible at http://{projectId}-{agentType}-{port}.localhost:{serverPort}/
          items:
            type: integer
          type: array
          uniqueItems: false
        image:
          type: string
        mounts:
          description: Mounts is a list of additional bind mounts from host into the
            container.
          items:
            $ref: '#/components/schemas/api.Mount'
          type: array
          uniqueItems: false
        name:
          type: string
        networkMode:
          $ref: '#/components/schemas/api.NetworkMode'
        projectPath:
          type: string
        skipPermissions:
          description: |-
            SkipPermissions controls whether terminals skip permission prompts.
            Stored as a Docker label on the container.
          type: boolean
        temporary:
          description: Temporary is true when a remote project's workspace is ephemeral.
          type: boolean
      type: object
    api.CreateWorktreeRequest:
      properties:
        name:
          description: Name is the worktree name (must be a valid git branch name).
          type: string
      type: object
    api.DefaultEnvVar:
      properties:
        key:
          type: string
        value:
          type: string
      type: object
    api.DefaultMount:
      properties:
        agentType:
          description: |-
            AgentType restricts this mount to a specific agent type.
            Empty means the mount applies to all agent types.
          type: string
        containerPath:
          type: string
        hostPath:
          type: string
        readOnly:
          type: boolean
        required:
          description: |-
            Required marks this mount as mandatory for the agent to function.
            Clients must not allow users to remove or change the container path of required mounts.
          type: boolean
      type: object
    api.DiffFileSummary:
      properties:
        additions:
          description: Additions is the number of lines added.
          type: integer
        deletions:
          description: Deletions is the number of lines removed.
          type: integer
        isBinary:
          description: IsBinary is true when the file is a binary file.
          type: boolean
        oldPath:
          description: OldPath is the previous path for renamed files.
          type: string
        path:
          description: Path is the file path relative to the worktree root.
          type: string
        status:
          description: 'Status is the change type: "added", "modified", "deleted",
            or "renamed".'
          type: string
      type: object
    api.DiffResponse:
      properties:
        files:
          description: Files lists per-file change statistics.
          items:
            $ref: '#/components/schemas/api.DiffFileSummary'
          type: array
          uniqueItems: false
        rawDiff:
          description: RawDiff is the unified diff output from git.
          type: string
        totalAdditions:
          description: TotalAdditions is the sum of additions across all files.
          type: integer
        totalDeletions:
          description: TotalDeletions is the sum of deletions across all files.
          type: integer
        truncated:
          description: Truncated is true when the raw diff exceeded the size limit
            and was capped.
          type: boolean
      type: object
    api.DirEntry:
      properties:
        isDir:
          type: boolean
        name:
          type: string
        path:
          type: string
      type: object
    api.Mount:
      properties:
        containerPath:
          description: ContainerPath is the absolute path inside the container.
          type: string
        hostPath:
          description: HostPath is the absolute path on the host.
          type: string
        readOnly:
          description: ReadOnly mounts the path as read-only inside the container.
          type: boolean
      type: object
    api.NetworkMode:
      description: NetworkMode controls the container's network isolation level.
      enum:
      - full
      - restricted
      - none
      type: string
      x-enum-varnames:
      - NetworkModeFull
      - NetworkModeRestricted
      - NetworkModeNone
    api.PostAuditEventRequest:
      properties:
        agentType:
          description: AgentType scopes the event to an agent type (e.g. "claude-code",
            "codex"). Optional.
          type: string
        attrs:
          additionalProperties: {}
          description: Attrs carries key-value metadata.
          type: object
        data:
          description: Data carries a raw JSON payload for structured event data.
          items:
            type: integer
          type: array
          uniqueItems: false
        event:
          description: Event is a snake_case identifier for the event type (e.g. "deployment_started").
            Required.
          type: string
        level:
          description: Level is the severity ("info", "warn", "error"). Defaults to
            "info" if omitted.
          type: string
        message:
          description: Message is a human-readable description.
          type: string
        projectId:
          description: ProjectID associates the event with a project. Optional.
          type: string
        source:
          description: |-
            Source identifies the origin of the event. Must be a valid AuditSource value.
            Defaults to "external" if omitted.
          type: string
        worktree:
          description: Worktree associates the event with a worktree. Optional.
          type: string
      type: object
    api.ProjectCostsResponse:
      properties:
        agentType:
          type: string
        isEstimated:
          type: boolean
        projectId:
          type: string
        sessions:
          items:
            $ref: '#/components/schemas/api.SessionCostEntry'
          type: array
          uniqueItems: false
        totalCost:
          type: number
      type: object
    api.ProjectResponse:
      properties:
        activeWorktreeCount:
          description: ActiveWorktreeCount is the number of worktrees with connected
            terminals.
          type: integer
        agentStatus:
          description: AgentStatus is the agent activity state ("idle", "working",
            "unknown").
          type: string
        agentType:
          $ref: '#/components/schemas/constants.AgentType'
        agentVersion:
          description: AgentVersion is the pinned CLI version installed in this container.
          type: string
        allowedDomains:
          description: AllowedDomains lists domains accessible when NetworkMode is
            "restricted".
          items:
            type: string
          type: array
          uniqueItems: false
        cloneURL:
          description: CloneURL is the git repository URL to clone (remote projects
            only).
          type: string
        costBudget:
          description: CostBudget is the per-project cost limit in USD (0 = use global
            default).
          type: number
        createdAt:
          type: integer
        forwardedPorts:
          description: ForwardedPorts lists container ports exposed via the reverse
            proxy.
          items:
            type: integer
          type: array
          uniqueItems: false
        hasContainer:
          description: HasContainer is true when a Docker container is associated
            with this project.
          type: boolean
        hostPath:
          description: HostPath is the absolute host directory mounted into the container
            (local projects only).
          type: string
        id:
          description: ID is the Docker container ID (empty when no container exists).
          type: string
        image:
          type: string
        isEstimatedCost:
          description: IsEstimatedCost is true when the cost is an estimate (e.g.
            subscription users).
          type: boolean
        isGitRepo:
          description: IsGitRepo indicates whether the container's /project is a git
            repository.
          type: boolean
        mountedDir:
          description: MountedDir is the host directory mounted into the container.
          type: string
        name:
          description: Name is the user-chosen display label / Docker container name.
          type: string
        needsInput:
          description: NeedsInput is true when any worktree requires user attention.
          type: boolean
        networkMode:
          $ref: '#/components/schemas/api.NetworkMode'
        notificationType:
          description: |-
            NotificationType indicates why the agent needs attention
            (e.g. "permission_prompt", "idle_prompt", "elicitation_dialog").
          type: string
        os:
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier (sha256 of
            host path or clone URL, 12 hex chars).
          type: string
        skipPermissions:
          description: SkipPermissions indicates whether terminals should skip permission
            prompts.
          type: boolean
        source:
          $ref: '#/components/schemas/api.ProjectSource'
        sshPort:
          type: string
        state:
          description: State is the Docker container state ("running", "exited", "not-found",
            etc).
          type: string
        status:
          description: Status is the Docker container status string (e.g. "Up 2 hours").
          type: string
        temporary:
          description: Temporary is true when a remote project's workspace is ephemeral
            (lost on container recreate).
          type: boolean
        totalCost:
          description: TotalCost is the aggregate cost across all worktrees in USD.
          type: number
        type:
          type: string
        workspaceDir:
          description: WorkspaceDir is the container-side workspace directory (mount
            destination).
          type: string
      type: object
    api.ProjectResult:
      description: Project holds the registered project result.
      properties:
        agentType:
          description: AgentType is the agent type for this project (e.g. "claude-code",
            "codex").
          type: string
        containerId:
          description: ContainerID is the Docker container ID, when available.
          type: string
        name:
          description: Name is the user-chosen project display name.
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier.
          type: string
      type: object
    api.ProjectSource:
      description: Source indicates whether the project is local (host mount) or remote
        (git clone).
      enum:
      - local
      - remote
      type: string
      x-enum-varnames:
      - ProjectSourceLocal
      - ProjectSourceRemote
    api.ProjectTemplate:
      description: Template holds project template values loaded from .warden.json,
        if present.
      properties:
        agents:
          additionalProperties:
            $ref: '#/components/schemas/api.AgentTemplateOverride'
          type: object
        costBudget:
          type: number
        forwardedPorts:
          items:
            type: integer
          type: array
          uniqueItems: false
        image:
          type: string
        networkMode:
          $ref: '#/components/schemas/api.NetworkMode'
        runtimes:
          items:
            type: string
          type: array
          uniqueItems: false
        skipPermissions:
          type: boolean
      type: object
    api.ResolveAccessItemsRequest:
      properties:
        items:
          items:
            $ref: '#/components/schemas/access.Item'
          type: array
          uniqueItems: false
      type: object
    api.ResolveAccessItemsResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/access.ResolvedItem'
          type: array
          uniqueItems: false
      type: object
    api.RuntimeDefault:
      properties:
        alwaysEnabled:
          description: AlwaysEnabled means this runtime cannot be deselected.
          type: boolean
        description:
          description: Description briefly explains what gets installed.
          type: string
        detected:
          description: Detected is true when marker files were found in the project
            directory.
          type: boolean
        domains:
          description: Domains lists network domains required for this runtime's package
            registry.
          items:
            type: string
          type: array
          uniqueItems: false
        envVars:
          additionalProperties:
            type: string
          description: EnvVars maps environment variable names to values set when
            enabled.
          type: object
        id:
          description: ID is the unique identifier (e.g. "node", "python", "go").
          type: string
        label:
          description: Label is the human-readable name (e.g. "Node.js", "Python").
          type: string
      type: object
    api.SessionCostEntry:
      properties:
        cost:
          type: number
        createdAt:
          type: string
        isEstimated:
          type: boolean
        sessionId:
          type: string
        updatedAt:
          type: string
      type: object
    api.TimeRange:
      description: TimeRange holds the earliest and latest event timestamps.
      properties:
        earliest:
          type: string
        latest:
          type: string
      type: object
    api.ToolCount:
      properties:
        count:
          type: integer
        name:
          type: string
      type: object
    api.UpdateAccessItemRequest:
      properties:
        credentials:
          items:
            $ref: '#/components/schemas/access.Credential'
          type: array
          uniqueItems: false
        description:
          type: string
        label:
          type: string
      type: object
    api.WorktreeInputRequest:
      properties:
        pressEnter:
          description: PressEnter appends Enter after the text. Defaults to true if
            omitted.
          type: boolean
        text:
          description: Text is the input to send. Required, max 64KB.
          type: string
      type: object
    constants.AgentType:
      description: AgentType identifies the CLI agent running in this project (e.g.
        "claude-code", "codex").
      enum:
      - claude-code
      - codex
      - claude-code
      type: string
      x-enum-varnames:
      - AgentClaudeCode
      - AgentCodex
      - DefaultAgentType
    docker.Info:
      properties:
        available:
          description: Available indicates whether the Docker API socket is reachable.
          type: boolean
        bridgeIP:
          description: |-
            BridgeIP is the host IP address reachable from containers via
            host.docker.internal. On Docker Desktop this is 127.0.0.1 (the
            VM's NAT forwards to host loopback). On native Docker it's the
            bridge network gateway (e.g. 172.17.0.1). Used as the listen
            address for socket bridge TCP proxies.
          type: string
        isDesktop:
          description: |-
            IsDesktop indicates whether the Docker runtime is Docker Desktop
            (as opposed to native Docker Engine, Colima, OrbStack, etc.).
            Detected via the OperatingSystem field from the Docker API info
            endpoint, which returns "Docker Desktop" for all Docker Desktop
            installations regardless of host OS.
          type: boolean
        name:
          description: Name is the runtime identifier ("docker").
          type: string
        socketPath:
          description: SocketPath is the filesystem path to the Docker API socket.
          type: string
        version:
          description: Version is Docker's reported API version, if available.
          type: string
      type: object
    engine.NotificationType:
      description: NotificationType indicates why Claude needs attention.
      enum:
      - permission_prompt
      - idle_prompt
      - auth_success
      - elicitation_dialog
      type: string
      x-enum-varnames:
      - NotificationPermissionPrompt
      - NotificationIdlePrompt
      - NotificationAuthSuccess
      - NotificationElicitationDialog
    engine.Worktree:
      properties:
        branch:
          description: Branch is the git branch checked out in this worktree.
          type: string
        exitCode:
          description: |-
            ExitCode is the agent's exit code when in shell state.
            Nil means the agent is still running (or no exit code captured).
          type: integer
        id:
          description: ID is the worktree identifier — directory name for git worktrees,
            "main" for project root.
          type: string
        needsInput:
          description: NeedsInput is true when Claude is blocked waiting for user
            attention.
          type: boolean
        notificationType:
          $ref: '#/components/schemas/engine.NotificationType'
        path:
          description: Path is the filesystem path inside the container.
          type: string
        projectId:
          description: ProjectID is the container ID this worktree belongs to.
          type: string
        state:
          $ref: '#/components/schemas/engine.WorktreeState'
      type: object
    engine.WorktreeState:
      description: State is the terminal connection state (connected, shell, background,
        stopped).
      enum:
      - connected
      - shell
      - background
      - stopped
      type: string
      x-enum-varnames:
      - WorktreeStateConnected
      - WorktreeStateShell
      - WorktreeStateBackground
      - WorktreeStateStopped
    server.ErrorCode:
      enum:
      - INVALID_BODY
      - INVALID_CONTAINER_ID
      - INVALID_CONTAINER_NAME
      - INVALID_WORKTREE_ID
      - INVALID_WORKTREE_NAME
      - REQUIRED_FIELD
      - INVALID_PATH
      - INVALID_NETWORK_CONFIG
      - NOT_A_DIRECTORY
      - NOT_FOUND
      - NAME_TAKEN
      - NOT_CONFIGURED
      - STALE_MOUNTS
      - BUDGET_EXCEEDED
      - PROXY_ERROR
      - INTERNAL
      type: string
      x-enum-comments:
        ErrCodeBudgetExceeded: "403"
        ErrCodeInternal: "500"
        ErrCodeNameTaken: "409"
        ErrCodeNotConfigured: "503"
        ErrCodeNotFound: "404"
        ErrCodeProxyError: "502"
        ErrCodeStaleMounts: "409"
      x-enum-varnames:
      - ErrCodeInvalidBody
      - ErrCodeInvalidContainerID
      - ErrCodeInvalidContainerName
      - ErrCodeInvalidWorktreeID
      - ErrCodeInvalidWorktreeName
      - ErrCodeRequiredField
      - ErrCodeInvalidPath
      - ErrCodeInvalidNetworkConfig
      - ErrCodeNotADirectory
      - ErrCodeNotFound
      - ErrCodeNameTaken
      - ErrCodeNotConfigured
      - ErrCodeStaleMounts
      - ErrCodeBudgetExceeded
      - ErrCodeProxyError
      - ErrCodeInternal
    server.apiError:
      properties:
        code:
          $ref: '#/components/schemas/server.ErrorCode'
        error:
          type: string
      type: object
    server.cleanupWorktreesResponse:
      properties:
        removed:
          description: Removed is the list of orphaned worktree IDs that were cleaned
            up.
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    server.healthResponse:
      properties:
        status:
          description: Status is always "ok" when the server is running.
          example: ok
          type: string
        version:
          description: Version is the server build version.
          example: v0.5.2
          type: string
      type: object
    server.revealRequest:
      properties:
        path:
          description: Path is the absolute host directory path to open.
          example: /home/user/projects
          type: string
      type: object
    server.shutdownResponse:
      properties:
        status:
          description: Status is always "shutting down".
          example: shutting down
          type: string
      type: object
    server.updateSettingsResponse:
      properties:
        restartRequired:
          description: RestartRequired is true when a setting change requires a server
            restart.
          type: boolean
      type: object
    server.validateContainerResponse:
      properties:
        missing:
          description: Missing lists the infrastructure components that are not installed.
          items:
            type: string
          type: array
          uniqueItems: false
        valid:
          description: Valid is true when all required infrastructure is present.
          type: boolean
      type: object
    service.ContainerResult:
      description: |-
        Container holds the container result when a container was created.
        Nil when the request did not include container configuration.
      properties:
        agentType:
          description: AgentType is the agent type for this container.
          type: string
        containerId:
          description: ContainerID is the Docker container ID.
          type: string
        name:
          description: Name is the container name.
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier.
          type: string
        recreated:
          description: Recreated is true when the container was fully recreated (not
            just settings updated).
          type: boolean
      type: object
    service.DefaultsResponse:
      properties:
        containerHomeDir:
          type: string
        envVars:
          items:
            $ref: '#/components/schemas/api.DefaultEnvVar'
          type: array
          uniqueItems: false
        homeDir:
          type: string
        mounts:
          items:
            $ref: '#/components/schemas/api.DefaultMount'
          type: array
          uniqueItems: false
        restrictedDomains:
          additionalProperties:
            items:
              type: string
            type: array
          type: object
        runtimes:
          description: Runtimes lists available language runtimes with detection results.
          items:
            $ref: '#/components/schemas/api.RuntimeDefault'
          type: array
          uniqueItems: false
        template:
          $ref: '#/components/schemas/api.ProjectTemplate'
      type: object
    service.ProjectResult:
      description: Project holds the registered project result.
      properties:
        agentType:
          description: AgentType is the agent type for this project (e.g. "claude-code",
            "codex").
          type: string
        containerId:
          description: ContainerID is the Docker container ID, when available.
          type: string
        name:
          description: Name is the user-chosen project display name.
          type: string
        projectId:
          description: ProjectID is the deterministic project identifier.
          type: string
      type: object
    service.SettingsResponse:
      properties:
        auditLogMode:
          $ref: '#/components/schemas/api.AuditLogMode'
        budgetActionPreventStart:
          type: boolean
        budgetActionStopContainer:
          type: boolean
        budgetActionStopWorktrees:
          type: boolean
        budgetActionWarn:
          description: Budget enforcement actions — what happens when a project exceeds
            its budget.
          type: boolean
        claudeCodeVersion:
          description: Pinned CLI versions installed in containers.
          type: string
        codexVersion:
          type: string
        defaultProjectBudget:
          type: number
        disconnectKey:
          type: string
        runtime:
          type: string
        version:
          description: Version is the server build version (e.g. "v0.5.2", "dev").
          type: string
        workingDirectory:
          description: |-
            WorkingDirectory is the server process's working directory. Used by
            development tooling to auto-create projects without manual path entry.
          type: string
      type: object
    service.UpdateSettingsRequest:
      properties:
        auditLogMode:
          $ref: '#/components/schemas/api.AuditLogMode'
        budgetActionPreventStart:
          type: boolean
        budgetActionStopContainer:
          type: boolean
        budgetActionStopWorktrees:
          type: boolean
        budgetActionWarn:
          type: boolean
        defaultProjectBudget:
          type: number
        disconnectKey:
          type: string
      type: object
    service.WorktreeResult:
      properties:
        projectId:
          description: ProjectID is the deterministic project identifier the worktree
            belongs to.
          type: string
        state:
          description: |-
            State is the worktree's terminal state after the mutation
            ("connected", "shell", "background", "stopped"). Best-effort — may be
            empty if the state could not be determined (e.g. container not running).
          type: string
        worktreeId:
          description: WorktreeID is the worktree identifier.
          type: string
      type: object
externalDocs:
  description: Integration Paths
  url: https://thesimonho.github.io/warden/integration/paths/
info:
  description: Container engine and control plane for running multiple Claude Code
    agents in isolated containers.
  license:
    name: Apache-2.0
    url: https://github.com/thesimonho/warden/blob/main/LICENSE
  title: Warden API
  version: "1.0"
openapi: 3.1.0
paths:
  /api/v1/access:
    get:
      description: |-
        Returns all access items (built-in + user-created) enriched with
        per-credential host detection status. Built-in items that have been
        customized via the DB are returned with the customized configuration.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.AccessItemListResponse'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: List access items
      tags:
      - access
    post:
      description: |-
        Creates a new user-defined access item with the given label, description,
        and credential configuration. Returns the created item with a generated ID.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.CreateAccessItemRequest'
                description: Access item configuration
                summary: body
        description: Access item configuration
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/access.Item'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Invalid input (missing label or credentials)
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Create access item
      tags:
      - access
  /api/v1/access/{id}:
    delete:
      description: |-
        Deletes a user-defined access item. Built-in items cannot be deleted —
        use the reset endpoint instead.
      parameters:
      - description: Access item ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Cannot delete built-in item
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Delete access item
      tags:
      - access
    get:
      description: |-
        Returns a single access item with detection status. For built-in items,
        returns the DB override if one exists, otherwise the default configuration.
      parameters:
      - description: Access item ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.AccessItemResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Item not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Get access item
      tags:
      - access
    put:
      description: |-
        Updates an access item. For built-in items, saves a customized copy to the DB
        (overriding the default). For user items, updates the existing DB row.
        Only provided fields are changed.
      parameters:
      - description: Access item ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.UpdateAccessItemRequest'
                description: Fields to update (all optional)
                summary: body
        description: Fields to update (all optional)
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/access.Item'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Invalid input
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Item not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Update access item
      tags:
      - access
  /api/v1/access/{id}/reset:
    post:
      description: |-
        Restores a built-in access item to its default configuration by removing
        any DB override. Only works for built-in items (git, ssh, gpg).
      parameters:
      - description: Built-in access item ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/access.Item'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not a built-in item
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Reset access item
      tags:
      - access
  /api/v1/access/resolve:
    post:
      description: |-
        Resolves the given access items by checking host sources and computing
        the injections (env vars, mounts) that would be applied to containers.
        Used by the UI "Test" button to preview resolution without creating a container.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.ResolveAccessItemsRequest'
                description: Item IDs to resolve
                summary: body
        description: Item IDs to resolve
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ResolveAccessItemsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Invalid request body
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Item not found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Resolve access items
      tags:
      - access
  /api/v1/audit:
    delete:
      description: |-
        Removes audit events matching the given filters. Supports scoping by
        project, worktree, and time range.
      parameters:
      - description: Filter by project ID
        in: query
        name: projectId
        schema:
          type: string
      - description: Filter by worktree ID
        in: query
        name: worktree
        schema:
          type: string
      - description: Delete entries after this timestamp (RFC3339)
        in: query
        name: since
        schema:
          type: string
      - description: Delete entries before this timestamp (RFC3339)
        in: query
        name: until
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                properties:
                  deleted:
                    type: integer
                type: object
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Delete audit events
      tags:
      - audit
    get:
      description: |-
        Returns audit-relevant events (sessions, tool uses, prompts, lifecycle)
        with optional filtering by project, worktree, category, and time range.
      parameters:
      - description: Filter by project ID
        in: query
        name: projectId
        schema:
          type: string
      - description: Filter by worktree ID
        in: query
        name: worktree
        schema:
          type: string
      - description: Filter by category (session, agent, prompt, config, budget, system,
          debug)
        in: query
        name: category
        schema:
          type: string
      - description: Filter by source (agent, backend, frontend, container)
        in: query
        name: source
        schema:
          type: string
      - description: Filter by level (info, warning, error)
        in: query
        name: level
        schema:
          type: string
      - description: Filter entries after this timestamp (RFC3339)
        in: query
        name: since
        schema:
          type: string
      - description: Filter entries before this timestamp (RFC3339)
        in: query
        name: until
        schema:
          type: string
      - description: Maximum entries to return (default 10000)
        in: query
        name: limit
        schema:
          type: integer
      - description: Number of entries to skip
        in: query
        name: offset
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/api.AuditEntry'
                type: array
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Get audit log
      tags:
      - audit
    post:
      description: |-
        Writes a custom audit event. Integrators can set source, project scope,
        and structured data. Source defaults to "external" if omitted.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.PostAuditEventRequest'
                description: Audit event to record
                summary: body
        description: Audit event to record
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Post audit event
      tags:
      - audit
  /api/v1/audit/export:
    get:
      description: Downloads audit events as CSV or JSON for compliance review.
      parameters:
      - description: 'Export format: csv or json (default json)'
        in: query
        name: format
        schema:
          type: string
      - description: Filter by project ID
        in: query
        name: projectId
        schema:
          type: string
      - description: Filter by worktree ID
        in: query
        name: worktree
        schema:
          type: string
      - description: Filter by category (session, agent, prompt, config, budget, system,
          debug)
        in: query
        name: category
        schema:
          type: string
      - description: Filter entries after this timestamp (RFC3339)
        in: query
        name: since
        schema:
          type: string
      - description: Filter entries before this timestamp (RFC3339)
        in: query
        name: until
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: file
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Export audit log
      tags:
      - audit
  /api/v1/audit/projects:
    get:
      description: Returns distinct project IDs that have audit events recorded.
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: List audit projects
      tags:
      - audit
  /api/v1/audit/summary:
    get:
      description: |-
        Returns aggregate statistics for audit events including session counts,
        tool usage, cost totals, and top tools.
      parameters:
      - description: Filter by project ID
        in: query
        name: projectId
        schema:
          type: string
      - description: Filter by worktree ID
        in: query
        name: worktree
        schema:
          type: string
      - description: Filter entries after this timestamp (RFC3339)
        in: query
        name: since
        schema:
          type: string
      - description: Filter entries before this timestamp (RFC3339)
        in: query
        name: until
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.AuditSummary'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Get audit summary
      tags:
