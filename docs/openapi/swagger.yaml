      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.WorktreeResult'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Connect terminal
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/{wid}/diff:
    get:
      description: |-
        Returns uncommitted changes (tracked and untracked files) for a worktree
        as a unified diff with per-file statistics.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.DiffResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Get worktree diff
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/{wid}/disconnect:
    post:
      description: |-
        Closes the terminal viewer WebSocket. The tmux session (and Claude/bash)
        continues running in the background.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.WorktreeResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Disconnect terminal
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/{wid}/input:
    post:
      description: |-
        Sends text to a worktree's terminal via tmux send-keys. Uses literal mode
        to prevent key-name interpretation. If pressEnter is true (default), appends
        Enter after the text. Enables headless/CI integrations without a WebSocket.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Agent type
        in: path
        name: agentType
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.WorktreeInputRequest'
                description: Input text
                summary: body
        description: Input text
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Send worktree input
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/{wid}/kill:
    post:
      description: |-
        Kills the tmux session and all child processes for the worktree.
        The git worktree directory on disk is preserved. This is destructive —
        any running Claude session is terminated immediately.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.WorktreeResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Kill worktree process
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/{wid}/reset:
    post:
      description: |-
        Clears session state for a worktree: kills any running process, deletes agent
        session files, and removes terminal tracking state. Audit events are preserved.
        The worktree itself is preserved.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.WorktreeResult'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Reset worktree
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/worktrees/cleanup:
    post:
      description: |-
        Removes worktree directories that are not tracked by git, kills orphaned tmux
        sessions, and prunes stale git worktree metadata.
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.cleanupWorktreesResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Cleanup orphaned worktrees
      tags:
      - worktrees
  /api/v1/projects/{projectId}/{agentType}/ws/{wid}:
    get:
      description: |-
        Upgrades to a WebSocket connection and bridges it to a tmux terminal session
        inside the container via docker exec. Binary frames carry raw PTY data;
        text frames carry JSON control messages (e.g. {"type":"resize","cols":80,"rows":24}).
      parameters:
      - description: Project ID
        in: path
        name: projectId
        required: true
        schema:
          type: string
      - description: Worktree ID
        in: path
        name: wid
        required: true
        schema:
          type: string
      responses:
        "101":
          description: WebSocket upgrade
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Terminal proxy not configured
      summary: Terminal WebSocket
      tags:
      - streaming
  /api/v1/projects/batch:
    post:
      description: |-
        Performs an action (stop, restart, delete) on multiple projects.
        Each project is processed independently — failures are per-item.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.BatchProjectRequest'
                description: Batch operation
                summary: body
        description: Batch operation
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.BatchProjectResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
      summary: Batch project operation
      tags:
      - projects
  /api/v1/runtimes:
    get:
      description: |-
        Detects and returns available container runtimes with
        their socket paths and API versions.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/docker.Info'
          description: OK
      summary: List runtimes
      tags:
      - host
  /api/v1/settings:
    get:
      description: Returns the current server-side settings including runtime, audit
        log state, and disconnect key.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/service.SettingsResponse'
          description: OK
      summary: Get settings
      tags:
      - settings
    put:
      description: |-
        Updates server-side settings. Only provided fields are changed. Changing the
        runtime requires a server restart. Changing auditLogMode syncs the flag to all running containers.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/service.UpdateSettingsRequest'
                description: Settings to update (all fields optional)
                summary: body
        description: Settings to update (all fields optional)
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.updateSettingsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Internal Server Error
      summary: Update settings
      tags:
      - settings
  /api/v1/shutdown:
    post:
      description: Requests a graceful shutdown of the Warden server process.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.shutdownResponse'
          description: OK
      summary: Shutdown server
      tags:
      - health
  /api/v1/template:
    get:
      description: |-
        Reads and parses a .warden.json file from the given path.
        Used to import templates from outside the project directory.
      parameters:
      - description: Absolute path to .warden.json
        in: query
        name: path
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ProjectTemplate'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Not Found
      summary: Read project template
      tags:
      - host
    post:
      description: |-
        Accepts a raw .warden.json body, validates it against the ProjectTemplate
        schema, applies security sanitization, and returns the cleaned template.
        Used by the frontend import-from-file flow.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/api.ProjectTemplate'
                description: Raw template JSON
                summary: body
        description: Raw template JSON
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/api.ProjectTemplate'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/server.apiError'
          description: Bad Request
      summary: Validate project template
      tags:
      - host
servers:
- description: Local development server
  url: http://localhost:8090
